services:
  s3-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx-sts-split.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - iceberg_rest_tests

  spark:
    environment:
      # Point S3 at the S3-only proxy (blocks STS)
      - LAKEKEEPER_TEST__S3_ENDPOINT=http://s3-proxy:8080
      # Point STS at the full proxy (allows STS)
      - LAKEKEEPER_TEST__S3_STS_ENDPOINT=http://s3-proxy:8081
    depends_on:
      s3-proxy:
        condition: service_started
