global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: lakekeeper
    metrics_path: /metrics
    static_configs:
      - targets: [lakekeeper:9000]
        labels: { service: lakekeeper }

  - job_name: openfga
    metrics_path: /metrics
    static_configs:
      - targets: [openfga:2112]
        labels: { service: openfga }

  - job_name: postgres-lakekeeper
    static_configs:
      - targets: [postgres-exporter:9187]
        labels: { service: lakekeeper-db }

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
